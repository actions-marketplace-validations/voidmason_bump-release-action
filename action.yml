name: "Bump and release"
description: "Bump the cargo workspace version, commit, tag, push, and optionally create a GitHub release. Installs cargo-edit itself; needs cargo, jq, gh and git on the runner."

branding:
  icon: 'corner-right-up'
  color: 'black'

inputs:
  token:
    description: "PAT with contents:write; used for checkout, push and the release."
    required: true
  version:
    description: "Bump action: patch, minor, major, beta, beta-minor, beta-major or finalize."
    required: true
  commit_note:
    description: "Optional text appended to the bump commit message."
    required: false
    default: ""
  release:
    description: "Create a GitHub release for the pushed tag (true/false)."
    required: false
    default: "true"
  prerelease:
    description: "Publish pre-release tags as GitHub pre-releases too (true/false)."
    required: false
    default: "false"
  name:
    description: "Committer name for the bump commit and tag."
    required: false
    default: "voidmason"
  email:
    description: "Committer email for the bump commit and tag."
    required: false
    default: "voidmason@users.noreply.github.com"

outputs:
  version:
    description: "The version after the bump (e.g. 1.2.3-beta.1)."
    value: ${{ steps.ver.outputs.next }}
  tag:
    description: "The pushed tag (e.g. v1.2.3-beta.1)."
    value: ${{ steps.tag.outputs.tag }}

runs:
  using: composite
  steps:
    # A dispatch from a tag runs on a detached HEAD:
    # the branch push silently becomes "Everything up-to-date",
    # the bump commit is lost, and the run still ends green.
    - shell: bash
      env:
        REF_TYPE: ${{ github.ref_type }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        if [ "$REF_TYPE" != "branch" ]; then
          echo "::error::the bump needs a branch to push to, got $REF_TYPE '$REF_NAME'"
          exit 1
        fi

    - uses: actions/checkout@v7
      with:
        # PAT so the bump commit can be pushed to a protected branch.
        # GITHUB_TOKEN (github-actions[bot]) cannot bypass branch rules.
        token: ${{ inputs.token }}
        # Keep the PAT out of .git/config; the push step passes it via env.
        # fetch-depth 0 already brings every tag.
        persist-credentials: false
        fetch-depth: 0

    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-edit

    # Inputs reach the shell only through env, never ${{ }} interpolation,
    # so a crafted input cannot inject into the run scripts.
    # GIT_CONFIG_GLOBAL/SYSTEM are pinned to /dev/null on every git step,
    # so runner-side config cannot leak into the commit or the pushes.
    - shell: bash
      env:
        NAME: ${{ inputs.name }}
        EMAIL: ${{ inputs.email }}
        GIT_CONFIG_GLOBAL: /dev/null
        GIT_CONFIG_SYSTEM: /dev/null
      run: |
        set -euo pipefail
        git config user.name "$NAME"
        git config user.email "$EMAIL"

    - id: ver
      shell: bash
      env:
        ACTION: ${{ inputs.version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        "$ACTION_PATH/bump-version.sh" "$ACTION"

    - shell: bash
      env:
        NEXT_VERSION: ${{ steps.ver.outputs.next }}
        COMMIT_NOTE: ${{ inputs.commit_note }}
        GIT_CONFIG_GLOBAL: /dev/null
        GIT_CONFIG_SYSTEM: /dev/null
      run: |
        set -euo pipefail
        MSG="Bump version to v${NEXT_VERSION}"
        if [ -n "$COMMIT_NOTE" ]; then
          MSG="${MSG}"$'\n\n'"${COMMIT_NOTE}"
        fi
        # -u stages only tracked files - the touched manifests and Cargo.lock -
        # so nothing stray from the runner slips into the bump commit.
        git add -u
        git commit -m "$MSG"

    - id: tag
      shell: bash
      env:
        NEXT_VERSION: ${{ steps.ver.outputs.next }}
        BRANCH: ${{ github.ref_name }}
        REPO: ${{ github.repository }}
        TOKEN: ${{ inputs.token }}
        GIT_CONFIG_GLOBAL: /dev/null
        GIT_CONFIG_SYSTEM: /dev/null
      run: |
        set -euo pipefail
        TAG="v${NEXT_VERSION}"
        git tag -a "$TAG" -m "$TAG"
        # The credential helper reads the PAT from env: it never shows in argv.
        # --atomic pushes the branch and the tag together or not at all,
        # and a tag that already exists on the remote fails loud here.
        git -c credential.helper='!f() { echo "username=x-access-token"; echo "password=${TOKEN}"; }; f' \
          push --atomic "https://github.com/${REPO}.git" "$BRANCH" "refs/tags/$TAG"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - if: inputs.release == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}
        TAG: ${{ steps.tag.outputs.tag }}
        PRERELEASE: ${{ inputs.prerelease }}
      run: |
        set -euo pipefail
        # Only final tags get a release by default;
        # the finalize release covers the whole beta series.
        case "$TAG" in
          *-*)
            if [ "$PRERELEASE" = "true" ]; then
              gh release create "$TAG" --verify-tag --generate-notes --prerelease
            else
              echo "pre-release $TAG: skipping the GitHub release"
            fi ;;
          *) gh release create "$TAG" --verify-tag --generate-notes ;;
        esac
