name: test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit
      - run: bash test/test-bump-version.sh
